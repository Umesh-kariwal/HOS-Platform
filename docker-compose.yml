version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hos_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecurePassword123
    volumes:
      - pgdata-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hos_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata-volume:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-volume:
  redisdata-volume:
